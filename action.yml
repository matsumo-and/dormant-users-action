name: 'Dormant Users Action'
description: 'Detects dormant GitHub org members via Members + Audit Log APIs — no per-user queries.'
author: 'matdumo-and'

inputs:
  org:
    description: 'GitHub organization name'
    required: true
  token:
    description: 'GitHub token with read:org and read:audit_log scopes (requires GitHub Enterprise Cloud or Team)'
    required: true
  days:
    description: 'Number of days to look back in the audit log (1–3650)'
    required: false
    default: '90'
  phrases:
    description: |
      Additional audit log filter phrases, one per line.
      Lines are OR-combined and appended to the base query.
      Do NOT include created:, actor:, or actor_is_bot: — these are controlled by the action.
      Example:
        action:repo.push
        action:pull_request.opened
    required: false
  include-bots:
    description: 'Set to true to include bot accounts in the dormancy check'
    required: false
    default: 'false'
  debug:
    description: 'Set to true to enable verbose debug logging'
    required: false
    default: 'false'

outputs:
  dormant-users-json:
    description: 'JSON array of dormant users [{login, id}]'
  dormant-users-csv:
    description: 'CSV of dormant users, header: login,id'
  dormant-users-count:
    description: 'Number of dormant users found'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'user-x'
  color: 'orange'
